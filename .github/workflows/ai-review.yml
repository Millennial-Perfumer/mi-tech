name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Generate PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Prepare review prompt
        run: |
          echo "You are a senior software engineer performing a pull request review.

          Review the following diff and provide:
          - Bugs or logical errors
          - Security vulnerabilities
          - Redundant or duplicated logic
          - Simpler or cleaner implementations
          - Performance issues
          - Violations of best practices

          PR DIFF:
          " > prompt.txt
          cat pr.diff >> prompt.txt

      - name: AI Review using Gemini 3 Flash
        id: flash
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use jq to safely construct the JSON payload
          JSON_PAYLOAD=$(jq -n --arg msg "$(cat prompt.txt)" '{contents: [{parts: [{text: $msg}]}]}')
          
          curl -f -s https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "$JSON_PAYLOAD" > review.json
          
          cat review.json

          echo "$RESPONSE" > review.json
          cat review.json

      - name: Fallback to Gemini 3.1 Pro
        if: steps.flash.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use jq to safely construct the JSON payload
          JSON_PAYLOAD=$(jq -n --arg msg "$(cat prompt.txt)" '{contents: [{parts: [{text: $msg}]}]}')
          
          curl -f -s https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro:generateContent \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "$JSON_PAYLOAD" > review.json
          
          cat review.json

      - name: Extract AI review text
        run: |
          cat review.json | jq -r '.candidates[0].content.parts[0].text' > review.txt
          echo "AI_REVIEW<<EOF" >> $GITHUB_ENV
          cat review.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.AI_REVIEW;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\n" + review
            });
