name: CI Validation

on:
  # push:
  #   branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mi-tech-test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Check Formatting
        run: |
          if [ "$(gofmt -l backend/internal backend/cmd | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt formatted:"
            gofmt -l backend/internal backend/cmd
            exit 1
          fi

      - name: Go Vet
        run: cd backend && go vet ./...

      - name: Build Backend
        run: cd backend && go build ./...

      - name: Run Tests
        env:
          TEST_DB_DSN: postgres://postgres:password@localhost:5432/mi-tech-test?sslmode=disable
        run: cd backend && go test -v ./...

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [ 'frontend', 'frontend-feedback', 'frontend-mobile' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ matrix.directory }}
          if [ "${{ matrix.directory }}" = "frontend" ] || [ "${{ matrix.directory }}" = "frontend-mobile" ]; then
            npm install --legacy-peer-deps
          else
            npm install
          fi

      - name: Lint
        run: cd ${{ matrix.directory }} && npm run lint

      - name: Build
        run: cd ${{ matrix.directory }} && npm run build
