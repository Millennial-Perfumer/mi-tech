basePath: /api
definitions:
  internal_domain_order_handler.UpdateStatusRequest:
    properties:
      status:
        type: string
    type: object
  internal_domain_sync_handler.SyncRequest:
    properties:
      end_date:
        type: string
      start_date:
        type: string
    type: object
  mi-tech_internal_domain_communication_dto.CreateTemplateRequest:
    properties:
      body:
        type: string
      buttons:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_communication_entity.TemplateButton'
        type: array
      category:
        type: string
      examples:
        type: string
      footer:
        type: string
      header:
        $ref: '#/definitions/mi-tech_internal_domain_communication_entity.TemplateHeader'
      language:
        type: string
      name:
        type: string
    type: object
  mi-tech_internal_domain_communication_entity.AutomationTemplate:
    properties:
      body:
        type: string
      buttons:
        items:
          type: integer
        type: array
      category:
        type: string
      created_at:
        type: string
      delivered_count:
        type: integer
      footer:
        type: string
      header:
        items:
          type: integer
        type: array
      id:
        type: integer
      language:
        type: string
      meta_template_id:
        type: string
      read_count:
        type: integer
      sent_count:
        type: integer
      status:
        description: PENDING, APPROVED, REJECTED
        type: string
      store_id:
        type: string
      template_name:
        type: string
      updated_at:
        type: string
      variable_mappings:
        items:
          type: integer
        type: array
    type: object
  mi-tech_internal_domain_communication_entity.TemplateButton:
    properties:
      flowID:
        description: Frontend camelCase
        type: string
      flowName:
        description: Frontend camelCase
        type: string
      offerCode:
        description: Frontend camelCase
        type: string
      payload:
        type: string
      phoneNumber:
        description: Frontend camelCase
        type: string
      text:
        type: string
      type:
        description: custom, visit_website, call_whatsapp, call_phone, flow, copy_code
        type: string
      url:
        type: string
    type: object
  mi-tech_internal_domain_communication_entity.TemplateHeader:
    properties:
      location:
        items:
          type: integer
        type: array
      sample:
        items:
          type: integer
        type: array
      text:
        type: string
      type:
        description: text, image, video, document, location, none
        type: string
    type: object
  mi-tech_internal_domain_communication_entity.Trigger:
    properties:
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      store_id:
        type: string
      template_body:
        description: Joined field
        type: string
      template_id:
        type: integer
      template_name:
        description: Joined field
        type: string
      template_status:
        description: Joined field
        type: string
      webhook_topic:
        type: string
    type: object
  mi-tech_internal_domain_dashboard_dto.B2CSRow:
    properties:
      camt:
        type: number
      iamt:
        type: number
      pos:
        type: string
      rt:
        type: number
      samt:
        type: number
      sply_ty:
        type: string
      txval:
        type: number
      typ:
        description: '"OE" (Other than E-commerce) or "E"'
        type: string
    type: object
  mi-tech_internal_domain_dashboard_dto.DocCategory:
    properties:
      doc_num:
        type: integer
      docs:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.DocRange'
        type: array
    type: object
  mi-tech_internal_domain_dashboard_dto.DocIssueWrapper:
    properties:
      doc_det:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.DocCategory'
        type: array
    type: object
  mi-tech_internal_domain_dashboard_dto.DocRange:
    properties:
      cancel:
        type: integer
      from:
        type: string
      net_issue:
        type: integer
      num:
        type: integer
      to:
        type: string
      totnum:
        type: integer
    type: object
  mi-tech_internal_domain_dashboard_dto.GSTR1Payload:
    properties:
      b2cs:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.B2CSRow'
        type: array
      cur_gt:
        type: number
      doc_issue:
        $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.DocIssueWrapper'
      fp:
        type: string
      gstin:
        type: string
      gt:
        type: number
      hash:
        type: string
      hsn:
        $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.HSNWrapper'
      version:
        type: string
    type: object
  mi-tech_internal_domain_dashboard_dto.HSNRow:
    properties:
      camt:
        type: number
      desc:
        type: string
      hsn_sc:
        type: string
      iamt:
        type: number
      num:
        type: integer
      qty:
        type: number
      samt:
        type: number
      txval:
        type: number
      uqc:
        type: string
      val:
        type: number
    type: object
  mi-tech_internal_domain_dashboard_dto.HSNWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_dashboard_dto.HSNRow'
        type: array
    type: object
  mi-tech_internal_domain_marketing_service.AssetHealth:
    properties:
      error:
        type: string
      instagram_authorized:
        type: boolean
      instagram_linked:
        type: boolean
      page_authorized:
        type: boolean
    type: object
  mi-tech_internal_domain_order_dto.LineItemCreateRequest:
    properties:
      discount:
        description: item-level discount amount
        type: number
      mi_sku:
        description: e.g. "mi-01"
        type: string
      price:
        description: unit price
        type: number
      quantity:
        type: integer
      title:
        type: string
    type: object
  mi-tech_internal_domain_order_dto.LineItemResponse:
    properties:
      discount:
        type: string
      hs_code:
        type: string
      id:
        type: string
      price:
        type: string
      product_id:
        type: string
      quantity:
        type: integer
      sku:
        type: string
      title:
        type: string
      variant_id:
        type: string
    type: object
  mi-tech_internal_domain_order_dto.OrderCreateRequest:
    properties:
      customer_address1:
        type: string
      customer_address2:
        type: string
      customer_city:
        type: string
      customer_country:
        type: string
      customer_email:
        type: string
      customer_name:
        type: string
      customer_phone:
        type: string
      customer_state:
        type: string
      customer_zip:
        type: string
      financial_status:
        description: 'default: "paid"'
        type: string
      fulfillment_status:
        description: 'default: "fulfilled"'
        type: string
      line_items:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_order_dto.LineItemCreateRequest'
        type: array
      terminal_code:
        description: '"POS1" (defaults if empty)'
        type: string
      total_discount:
        type: number
      total_price:
        type: number
    type: object
  mi-tech_internal_domain_order_dto.OrderResponse:
    properties:
      cancel_reason:
        type: string
      cancelled_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      customer_address1:
        type: string
      customer_address2:
        type: string
      customer_city:
        type: string
      customer_country:
        type: string
      customer_email:
        type: string
      customer_first_name:
        type: string
      customer_last_name:
        type: string
      customer_name:
        type: string
      customer_phone:
        type: string
      customer_state:
        type: string
      customer_zip:
        type: string
      delivery_status:
        type: string
      feedback_sent_at:
        type: string
      feedback_status_id:
        type: integer
      financial_status:
        type: string
      fulfillment_status:
        type: string
      id:
        type: string
      line_items:
        items:
          $ref: '#/definitions/mi-tech_internal_domain_order_dto.LineItemResponse'
        type: array
      order_number:
        type: string
      shipping_company:
        type: string
      source_id:
        type: string
      status:
        type: string
      subtotal_price:
        type: string
      total_price:
        type: string
      total_tax:
        type: string
      tracking_number:
        type: string
      tracking_url:
        type: string
      updated_at:
        type: string
    type: object
  mi-tech_internal_domain_order_dto.OrderUpdateRequest:
    properties:
      customer_address1:
        type: string
      customer_address2:
        type: string
      customer_city:
        type: string
      customer_country:
        type: string
      customer_email:
        type: string
      customer_first_name:
        type: string
      customer_last_name:
        type: string
      customer_phone:
        type: string
      customer_state:
        type: string
      customer_zip:
        type: string
    type: object
  mi-tech_internal_domain_order_entity.Customer:
    properties:
      address1:
        type: string
      address2:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      external_id:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      phone_number:
        type: string
      source_id:
        type: string
      state:
        type: string
      total_orders:
        type: integer
      total_spent:
        type: number
      updated_at:
        type: string
      zip_code:
        type: string
    type: object
  mi-tech_internal_shared_system_service.Document:
    properties:
      slug:
        type: string
      title:
        type: string
    type: object
info:
  contact: {}
  description: Backend API for Mi-Tech GST Invoice Manager.
  title: Mi-Tech API
  version: "1.0"
paths:
  /automation/whatsapp/messages:
    get:
      description: Retrieve a paginated list of all sent and received WhatsApp messages.
      parameters:
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: Filter by template
        in: query
        name: template_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List message logs
      tags:
      - automation
  /automation/whatsapp/metrics:
    get:
      description: Aggregate delivery, read, and failure rates for automated messages.
      parameters:
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get automation analytics
      tags:
      - automation
  /automation/whatsapp/metrics/sync:
    post:
      description: Fetch delivery and read analytics directly from Meta's Insight
        API.
      parameters:
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Sync Meta insights
      tags:
      - automation
  /automation/whatsapp/send-manual:
    post:
      consumes:
      - application/json
      description: Trigger a specific template message for a given order manually.
      parameters:
      - description: Send request (order_id, template_id)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Send manual template
      tags:
      - automation
  /automation/whatsapp/templates:
    delete:
      description: Remove a template from the local database.
      parameters:
      - description: Template ID
        in: query
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
      security:
      - Bearer: []
      summary: Delete WhatsApp template
      tags:
      - automation
    get:
      description: Retrieve all imported WhatsApp templates with optional date filtering.
      parameters:
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/mi-tech_internal_domain_communication_entity.AutomationTemplate'
            type: array
      security:
      - Bearer: []
      summary: List WhatsApp templates
      tags:
      - automation
    post:
      consumes:
      - application/json
      description: Import a new template from Meta or create a custom one.
      parameters:
      - description: Template data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mi-tech_internal_domain_communication_dto.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Create WhatsApp template
      tags:
      - automation
    put:
      consumes:
      - application/json
      description: Update the variable mappings for a WhatsApp template.
      parameters:
      - description: Updated mapping
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mi-tech_internal_domain_communication_entity.AutomationTemplate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - Bearer: []
      summary: Update template mapping
      tags:
      - automation
  /automation/whatsapp/templates/sync:
    post:
      description: Fetch latest approval statuses for all templates from Meta.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Sync template status
      tags:
      - automation
  /automation/whatsapp/templates/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image or PDF to Meta's servers for use in template headers.
      parameters:
      - description: Media file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Upload media to Meta
      tags:
      - automation
  /automation/whatsapp/triggers:
    get:
      description: Retrieve all configured Webhook-to-Template mappings.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/mi-tech_internal_domain_communication_entity.Trigger'
            type: array
      security:
      - Bearer: []
      summary: List automation triggers
      tags:
      - automation
    post:
      consumes:
      - application/json
      description: Link a Shopify webhook topic to a WhatsApp template.
      parameters:
      - description: Trigger data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
      security:
      - Bearer: []
      summary: Create automation trigger
      tags:
      - automation
    put:
      consumes:
      - application/json
      description: Enable or disable a specific Webhook-to-Template trigger.
      parameters:
      - description: Trigger toggle data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - Bearer: []
      summary: Toggle automation trigger
      tags:
      - automation
  /automation/whatsapp/webhook:
    post:
      consumes:
      - application/json
      description: Endpoint for Meta Cloud API to push delivery receipts and incoming
        customer messages.
      parameters:
      - description: HMAC Signature
        in: header
        name: X-Hub-Signature-256
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: WhatsApp Webhook
      tags:
      - automation
  /customers:
    delete:
      description: Wipe the entire customers table. Required 'admin' role.
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete all customers
      tags:
      - customers
    get:
      description: Retrieve a paginated list of customers with advanced filtering.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search
        in: query
        name: search
        type: string
      - description: Sort field
        in: query
        name: sortBy
        type: string
      - description: Sort order
        in: query
        name: sortOrder
        type: string
      - description: City filter
        in: query
        name: city
        type: string
      - description: State filter
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List customers
      tags:
      - customers
    post:
      consumes:
      - application/json
      description: Manually create a new customer profile.
      parameters:
      - description: Customer data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mi-tech_internal_domain_order_entity.Customer'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mi-tech_internal_domain_order_entity.Customer'
      security:
      - Bearer: []
      summary: Create customer
      tags:
      - customers
  /customers/{id}:
    delete:
      description: Remove a specific customer.
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete customer
      tags:
      - customers
    put:
      consumes:
      - application/json
      description: Update an existing customer profile.
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mi-tech_internal_domain_order_entity.Customer'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mi-tech_internal_domain_order_entity.Customer'
      security:
      - Bearer: []
      summary: Update customer
      tags:
      - customers
  /customers/bulk-delete:
    post:
      consumes:
      - application/json
      description: Delete multiple customers by their IDs.
      parameters:
      - description: List of IDs
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Bulk delete customers
      tags:
      - customers
  /customers/export-meta:
    get:
      description: Export a CSV compatible with Meta Custom Audiences.
      parameters:
      - description: 'Audience type: ''customer'' or ''engaged'''
        in: query
        name: type
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - Bearer: []
      summary: Export Meta audience CSV
      tags:
      - customers
  /customers/import:
    post:
      consumes:
      - multipart/form-data
      description: Upload a CSV file and import customer data.
      parameters:
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      - description: Source ID
        in: formData
        name: source_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Import customers CSV
      tags:
      - customers
  /marketing/meta/ads:
    get:
      description: Fetch all individual ads for a specific Meta Adset, including insights.
      parameters:
      - description: Meta Adset ID
        in: query
        name: adset_id
        required: true
        type: string
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List Meta ads
      tags:
      - marketing
  /marketing/meta/adsets:
    get:
      description: Fetch all adsets for a specific Meta Campaign, including insights.
      parameters:
      - description: Meta Campaign ID
        in: query
        name: campaign_id
        required: true
        type: string
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List Meta adsets
      tags:
      - marketing
  /marketing/meta/campaigns:
    get:
      description: Fetch all campaigns for a specific Meta Ad Account.
      parameters:
      - description: Meta Ad Account ID
        in: query
        name: ad_account_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List Meta campaigns
      tags:
      - marketing
  /marketing/meta/overview:
    get:
      description: High-level summary of active campaigns, ad accounts, and performance
        insights.
      parameters:
      - description: Start date
        in: query
        name: start_date
        type: string
      - description: End date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Meta Marketing Overview
      tags:
      - marketing
  /marketing/smm/health:
    get:
      description: Audit the visibility and linkage of configured Meta Page and Instagram
        IDs.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mi-tech_internal_domain_marketing_service.AssetHealth'
      security:
      - Bearer: []
      summary: SMM Health Check
      tags:
      - social
